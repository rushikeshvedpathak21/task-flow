# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database (MySQL) ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=taskflow_user
spring.datasource.password=taskflow_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=TaskFlowSuperSecretKeyForJWTSigningMustBe256BitsLong1234567890ABCDEF
app.jwt.expiration-ms=86400000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.taskflow=INFO
logging.level.org.springframework.security=WARN
